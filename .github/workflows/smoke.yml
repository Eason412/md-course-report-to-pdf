name: Smoke Test

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Pandoc and fonts
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pandoc fonts-noto-cjk poppler-utils qpdf

      - name: Cache Tectonic packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/Tectonic
          key: ${{ runner.os }}-tectonic-${{ hashFiles('assets/templates/**/*.tex', 'examples/**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-tectonic-

      - name: Set up Tectonic
        uses: wtfjoke/setup-tectonic@v4

      - name: Check PDF compiler
        run: tectonic --version

      - name: Check Python syntax
        run: python3 -m py_compile scripts/*.py tests/*.py

      - name: Run regression tests
        run: python3 -m unittest -v tests.test_regressions

      - name: Run smoke tests
        env:
          MD_COURSE_REPORT_REQUIRE_COMPILER: "1"
          MD_COURSE_REPORT_REQUIRE_PDF_TOOLS: "1"
        run: python3 scripts/run_smoke_tests.py
